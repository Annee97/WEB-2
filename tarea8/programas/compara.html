<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compara Números</title>
    <link rel="stylesheet" href="style.css">
    <script src="compara.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Compara Números</h1>
        
        <div class="compare-section">

        <button id="compareBtn" class="button">Comparar</button>
        <p id="result" class="compare-result"></p>

        <a href="/" class="button-back">Volver al Inicio</a>
    </div>
</body>
</html>
